{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div style="max-width:500px">
<div class="card">
    <div class="card-header"><span class="card-title">Datos del Usuario</span></div>
    <div class="card-body">
        <form method="post">
            <div class="form-group">
                <label>Nombre de Usuario *</label>
                <input type="text" name="username" required placeholder="usuario123" value="{{ usuario.username if usuario else '' }}">
            </div>
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" placeholder="Nombre completo" value="{{ usuario.nombre if usuario else '' }}">
            </div>
            <div class="form-group">
                <label>Contrasena *</label>
                <input type="password" name="password" required placeholder="Minimo 6 caracteres">
            </div>
            <div class="form-group">
                <label>Rol</label>
                <select name="rol">
                    <option value="admin">Administrador</option>
                    <option value="vendedor">Vendedor</option>
                </select>
            </div>
            <div style="display:flex;gap:12px">
                <button type="submit" class="btn btn-primary">Guardar Usuario</button>
                <a href="{{ url_for('usuarios') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
